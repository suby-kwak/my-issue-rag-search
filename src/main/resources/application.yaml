spring:
  application:
    name: ragSearch
  datasource:
    url: jdbc:postgresql://localhost:5432/ragsearch
    username: ragsearch
    password: ragsearch
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: nomic-embed-text
      chat:
        options:
          model: qwen2.5:14b
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW

rag:
  query:
    top-k: 5
